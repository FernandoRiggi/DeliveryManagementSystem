services:
  db:
    image: postgres:16
    container_name: delivery-db
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: delivery
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: c2hhMjU2JmNoYXZlX3Rlc3RlX3BhcmFfYW1iaWVudGVfYWNhZGVtaWNv
      SEED_ADMIN_PASSWORD: Admin@2024!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: