spring.application.name=demo-auth-app

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:delivery}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never
spring.datasource.hikari.maximum-pool-size=10

logging.level.org.springframework.jdbc.core.JdbcTemplate=WARN
logging.level.org.springframework.jdbc.datasource=WARN

springdoc.swagger-ui.path=/api/v1/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.path=/api/v1/openapi
springdoc.swagger-ui.operationsSorter=alpha

application.jwt.secretKey=${JWT_SECRET}
application.jwt.tokenExpiration=8640000
seed.admin.password=${SEED_ADMIN_PASSWORD:Admin@2024!}

